<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0046ad;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); margin-bottom: 5px; }

        /* Controles: Busca e Refresh */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .search-box { flex-grow: 1; position: relative; }
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .search-box i { position: absolute; left: 15px; top: 15px; color: #aaa; }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-refresh:hover { background: #003585; }

        /* Grid de Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .logo-box { height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .logo-box img { max-height: 100%; max-width: 140px; }

        .card h3 { margin: 10px 0; font-size: 1.1rem; color: var(--primary); }
        .tag { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; background: #e9f0ff; color: var(--primary); padding: 5px 12px; border-radius: 20px; margin-top: auto; }

        /* Loader */
        .loader { 
            display: none; 
            width: 30px; height: 30px; 
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); 
            border-radius: 50%; animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hub de Aplicações</h1>
        <p>Acesso rápido às nossas plataformas</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Pesquisar por nome ou categoria..." onkeyup="filterCards()">
        </div>
        <button class="btn-refresh" onclick="loadData()">
            <i class="fa fa-sync-alt"></i> Atualizar
        </button>
    </div>

    <div id="loader" class="loader"></div>
    <div id="app-grid" class="grid"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz6kx45bKx973iMsrI537AzjuuWWVCwqPDe3lsHw-9177hckLki0k31AjWxy-9a68rj/exec';
    const LOGO_TOKEN = 'pk_Cp_VHfCSTQKbhfXfV2AZSw';
    let rawData = [];

    async function loadData() {
        const grid = document.getElementById('app-grid');
        const loader = document.getElementById('loader');
        
        loader.style.display = 'block';
        grid.style.opacity = '0.3';

        try {
            const response = await fetch(API_URL);
            rawData = await response.json();
            renderGrid(rawData);
        } catch (err) {
            console.error("Erro:", err);
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Erro ao conectar com a base de dados.</p>";
        } finally {
            loader.style.display = 'none';
            grid.style.opacity = '1';
        }
    }

    function renderGrid(items) {
        const grid = document.getElementById('app-grid');
        grid.innerHTML = '';

        items.forEach(item => {
            if(!item.URL) return;

            // Extrai o domínio para o Logo.dev
            let domain = "";
            try {
                domain = new URL(item.URL).hostname;
            } catch(e) { domain = ""; }

            const logoUrl = domain ? `https://img.logo.dev/${domain}?token=${LOGO_TOKEN}` : 'https://via.placeholder.com/70';

            const card = document.createElement('a');
            card.className = 'card';
            card.href = item.URL;
            card.target = '_blank';
            card.innerHTML = `
                <div class="logo-box">
                    <img src="${logoUrl}" onerror="this.src='https://via.placeholder.com/70?text=App'" alt="Logo">
                </div>
                <h3>${item.Description}</h3>
                <span class="tag">${item.Type}</span>
            `;
            grid.appendChild(card);
        });
    }

    function filterCards() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = rawData.filter(item => 
            (item.Description && item.Description.toLowerCase().includes(query)) || 
            (item.Type && item.Type.toLowerCase().includes(query))
        );
        renderGrid(filtered);
    }

    window.onload = loadData;
</script>

</body>
</html>
